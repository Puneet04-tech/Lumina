services:
  - type: web
    name: lumina-backend
    env: node
    plan: free
    region: oregon
    root: server
    
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3500
      - key: CORS_ORIGIN
        value: "https://lu-m-i-n-a.netlify.app"
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
    
    # Build logs
    buildFilter:
      paths:
        - server/**
    
    # Health checks
    healthCheckPath: /api/health
    healthCheckInterval: 120
    healthCheckTimeout: 30
    
    # Auto-deploy on push
    autoDeploy: true
    
    # Disk
    disk:
      name: lumina-data
      mountPath: /data
      sizeGB: 1
